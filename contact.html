    <div class="container">
        <div class="row">
            <div class="col-6">
                <!-- Contact Form-->
                 <form action="/contact">
                  <div class="row">
                    <div class="col-4">
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Name">
                        </div>
                    </div>
                     <div class="col-4">
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Email Id">
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Phone No">
                        </div>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-8">
                        <div class="form-group">
                            <input type="text" placeholder="Subject" class="form-control">
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="form-group">
                            <select class="form-control">
                                <option >--Select--</option>
                                <option >Web Development</option>
                                <option >Cloud App Services</option>
                                <option >Digital Marketing</option>
                                <option >--Select--</option>
                                <option >--Select--</option>
                            </select>
                        </div>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <textarea class="form-control" rows="4" placeholder="Message"></textarea>
                        </div>
                    </div>
                  </div>
                  <input type="submit" value="Submit Comment" class="btn btn-warning">
                 </form>
            </div>
            <div class="col-6">
                <!-- Google Map -->
                 <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3366.69018035256!2d77.70099619999999!3d12.9624147!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae10d5b2786a23%3A0xb08461de6796aef8!2sGreet%20Labs%20Private%20Limited!5e1!3m2!1sen!2sin!4v1773668583012!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
